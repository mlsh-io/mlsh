name: mlsh-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  # -- Gate: refuse to release a SHA whose CI never went green -------------------
  ci-gate:
    name: ci-gate
    runs-on: ubuntu-latest
    steps:
      - name: Verify mlsh-cli.yml succeeded on tagged SHA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Checking mlsh-cli workflow status for $SHA"
          conclusion=$(gh api \
            "repos/$REPO/actions/workflows/mlsh-cli.yml/runs?head_sha=$SHA&per_page=100" \
            --jq '[.workflow_runs[] | select(.event != "pull_request")] | sort_by(.run_started_at) | last | .conclusion // "missing"')
          echo "conclusion=$conclusion"
          if [ "$conclusion" != "success" ]; then
            echo "::error::mlsh-cli workflow on $SHA is '$conclusion' (need 'success'). Tag aborted."
            exit 1
          fi

  # -- Build binaries (cross-platform) -------------------------------------------
  build:
    name: build (${{ matrix.target }})
    needs: [ci-gate]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build UI
        shell: bash
        run: |
          cd mlsh-cli/ui
          npm ci
          npm run build

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release -p mlsh-cli --features control-plane --target ${{ matrix.target }}

      - name: Build (cargo)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release -p mlsh-cli --features control-plane --target ${{ matrix.target }}
        env:
          RUSTFLAGS: ${{ matrix.target == 'x86_64-pc-windows-msvc' && '-C target-feature=+crt-static' || '' }}

      - name: Create mlshtund symlink
        if: matrix.archive == 'tar.gz'
        run: ln -sf mlsh target/${{ matrix.target }}/release/mlshtund

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: tar czfh mlsh-cli-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release mlsh mlshtund

      - name: Download wintun
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          curl -fsSL -o wintun.zip https://www.wintun.net/builds/wintun-0.14.1.zip
          echo "07c256185d6ee3652e09fa55c0b673e2624b565e02c4b9091c79ca7d2f24ef51  wintun.zip" | sha256sum -c
          7z e wintun.zip wintun/bin/amd64/wintun.dll -o./wintun-amd64 -y
          7z e wintun.zip wintun/LICENSE.txt -o./wintun-license -y

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/mlsh.exe target/${{ matrix.target }}/release/mlshtund.exe
          7z a mlsh-cli-${{ matrix.target }}.zip \
            ./target/${{ matrix.target }}/release/mlsh.exe \
            ./target/${{ matrix.target }}/release/mlshtund.exe \
            ./wintun-amd64/wintun.dll \
            ./wintun-license/LICENSE.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlsh-cli-${{ matrix.target }}
          path: mlsh-cli-${{ matrix.target }}.${{ matrix.archive }}

  # -- macOS .app bundle (universal) -----------------------------------------------
  app-bundle:
    name: MLSH.app (universal)
    needs: [ci-gate]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: app-bundle

      - name: Build MLSH.app (universal)
        run: make app-universal

      - name: Archive MLSH.app
        run: tar czfh MLSH.app.tar.gz -C target MLSH.app

      - name: Upload MLSH.app
        uses: actions/upload-artifact@v4
        with:
          name: MLSH.app
          path: MLSH.app.tar.gz

  # -- macOS .pkg installer (universal) ------------------------------------------
  macos-installer:
    name: macos-installer
    needs: [app-bundle]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Download MLSH.app
        uses: actions/download-artifact@v4
        with:
          name: MLSH.app
          path: artifacts

      - name: Extract MLSH.app
        run: tar xzf artifacts/MLSH.app.tar.gz

      - name: Build .pkg
        run: |
          chmod +x installer/macos/build-pkg.sh
          installer/macos/build-pkg.sh "${{ github.ref_name }}" MLSH.app

      - name: Upload .pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlsh-macos-installer
          path: installer/macos/output/*.pkg

  # -- Linux .deb packages --------------------------------------------------------
  linux-deb:
    name: deb (${{ matrix.arch }})
    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: amd64
          - target: aarch64-unknown-linux-musl
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: mlsh-cli-${{ matrix.target }}
          path: artifacts

      - name: Extract binaries
        run: |
          mkdir -p bin
          tar xzf artifacts/mlsh-cli-${{ matrix.target }}.tar.gz -C bin

      - name: Build .deb
        run: |
          chmod +x installer/linux/build-deb.sh
          installer/linux/build-deb.sh "${{ github.ref_name }}" "${{ matrix.arch }}" bin

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlsh-deb-${{ matrix.arch }}
          path: installer/linux/output/*.deb

  # -- Linux .rpm packages --------------------------------------------------------
  linux-rpm:
    name: rpm (${{ matrix.arch }})
    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: x86_64
          - target: aarch64-unknown-linux-musl
            arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install rpmbuild
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: mlsh-cli-${{ matrix.target }}
          path: artifacts

      - name: Extract binaries
        run: |
          mkdir -p bin
          tar xzf artifacts/mlsh-cli-${{ matrix.target }}.tar.gz -C bin

      - name: Build .rpm
        run: |
          chmod +x installer/linux/build-rpm.sh
          installer/linux/build-rpm.sh "${{ github.ref_name }}" "${{ matrix.arch }}" bin

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlsh-rpm-${{ matrix.arch }}
          path: installer/linux/output/*.rpm

  # -- Windows tray app (Qt6 / MinGW) --------------------------------------------
  windows-systray:
    name: windows-systray
    needs: [ci-gate]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt (MinGW)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.1'
          host: windows
          target: desktop
          arch: win64_mingw
          tools: 'tools_mingw1310'
          cache: true
          # Qt 6.11+ changed its repo folder layout; aqtinstall 3.3.0 (latest
          # PyPI) can't read it -> "Failed to locate XML data for Qt 6.11.1".
          # Fixed by miurahr/aqtinstall#1000, merged to master but unreleased.
          # aqtsource runs `pip install "<value>"`, so pin to that commit
          # until a >3.3.0 release ships.
          aqtsource: 'git+https://github.com/miurahr/aqtinstall.git@8c3695d4a4e1ceabf6a74dc6c79681656dc6b74b'

      - name: Build (CMake + MinGW)
        shell: pwsh
        run: |
          $gcc = Get-ChildItem "$env:IQTA_TOOLS" -Recurse -Filter gcc.exe | Select-Object -First 1
          $env:Path = "$($gcc.Directory.FullName);$env:Path"
          cmake -S mlsh-systray -B mlsh-systray/build -G "MinGW Makefiles" `
            -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"
          cmake --build mlsh-systray/build -j

      - name: Deploy (windeployqt)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force installer/windows/systray | Out-Null
          Copy-Item mlsh-systray/build/mlsh-systray.exe installer/windows/systray/
          & "$env:QT_ROOT_DIR\bin\windeployqt.exe" --release --no-translations `
            --no-system-d3d-compiler --no-opengl-sw --compiler-runtime `
            installer/windows/systray/mlsh-systray.exe

      - name: Upload systray artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlsh-systray-windows
          path: installer/windows/systray

  # -- Windows Installer (Inno Setup) ---------------------------------------------
  windows-installer:
    name: windows-installer
    needs: [build, windows-systray]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: mlsh-cli-x86_64-pc-windows-msvc
          path: artifacts

      - name: Prepare installer input
        shell: bash
        run: |
          mkdir -p installer/windows/bin
          cd artifacts
          7z e mlsh-cli-x86_64-pc-windows-msvc.zip -o../installer/windows/bin -y -r

      - name: Download tray app
        uses: actions/download-artifact@v4
        with:
          name: mlsh-systray-windows
          path: installer/windows/systray

      - name: Build installer
        shell: cmd
        run: |
          iscc /DAppVersion=${{ github.ref_name }} installer\windows\mlsh.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlsh-windows-installer
          path: installer/windows/output/*.exe

  # -- Create GitHub Release -----------------------------------------------------
  release:
    name: release
    needs: [build, macos-installer, linux-deb, linux-rpm, windows-installer]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum mlsh-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/mlsh-cli-*
            artifacts/mlsh_*.deb
            artifacts/mlsh-*.rpm
            artifacts/mlsh-*-setup.exe
            artifacts/mlsh-*-universal.pkg
            artifacts/checksums.txt
