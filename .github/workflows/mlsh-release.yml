name: mlsh-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # -- Build binaries (cross-platform) -------------------------------------------
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release -p mlsh-cli --target ${{ matrix.target }}

      - name: Build (cargo)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release -p mlsh-cli --target ${{ matrix.target }}

      - name: Create mlshtund symlink
        if: matrix.archive == 'tar.gz'
        run: ln -sf mlsh target/${{ matrix.target }}/release/mlshtund

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: tar czfh mlsh-cli-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release mlsh mlshtund

      - name: Download wintun
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          curl -fsSL -o wintun.zip https://www.wintun.net/builds/wintun-0.14.1.zip
          echo "07c256185d6ee3652e09fa55c0b673e2624b565e02c4b9091c79ca7d2f24ef51  wintun.zip" | sha256sum -c
          7z e wintun.zip wintun/bin/amd64/wintun.dll -o./wintun-amd64 -y
          7z e wintun.zip wintun/LICENSE.txt -o./wintun-license -y

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/mlsh.exe target/${{ matrix.target }}/release/mlshtund.exe
          7z a mlsh-cli-${{ matrix.target }}.zip \
            ./target/${{ matrix.target }}/release/mlsh.exe \
            ./target/${{ matrix.target }}/release/mlshtund.exe \
            ./wintun-amd64/wintun.dll \
            ./wintun-license/LICENSE.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlsh-cli-${{ matrix.target }}
          path: mlsh-cli-${{ matrix.target }}.${{ matrix.archive }}

  # -- macOS .app bundle (universal) -----------------------------------------------
  app-bundle:
    name: MLSH.app (universal)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: app-bundle

      - name: Build MLSH.app (universal)
        run: make app-universal

      - name: Upload MLSH.app
        uses: actions/upload-artifact@v4
        with:
          name: MLSH.app
          path: target/MLSH.app

  # -- macOS .pkg installer (universal) ------------------------------------------
  macos-installer:
    name: macos-installer
    needs: [app-bundle]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Download MLSH.app
        uses: actions/download-artifact@v4
        with:
          name: MLSH.app
          path: MLSH.app

      - name: Build .pkg
        run: |
          chmod +x installer/macos/build-pkg.sh
          installer/macos/build-pkg.sh "${{ github.ref_name }}" MLSH.app

      - name: Upload .pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlsh-macos-installer
          path: installer/macos/output/*.pkg

  # -- Windows Installer (Inno Setup) ---------------------------------------------
  windows-installer:
    name: windows-installer
    needs: [build]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: mlsh-cli-x86_64-pc-windows-msvc
          path: artifacts

      - name: Prepare installer input
        shell: bash
        run: |
          mkdir -p installer/windows/bin
          cd artifacts
          7z e mlsh-cli-x86_64-pc-windows-msvc.zip -o../installer/windows/bin -y -r

      - name: Build installer
        shell: cmd
        run: |
          iscc /DAppVersion=${{ github.ref_name }} installer\windows\mlsh.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlsh-windows-installer
          path: installer/windows/output/*.exe

  # -- Create GitHub Release -----------------------------------------------------
  release:
    name: release
    needs: [build, macos-installer, windows-installer]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum mlsh-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/mlsh-cli-*
            artifacts/mlsh-*-setup.exe
            artifacts/mlsh-*-universal.pkg
            artifacts/checksums.txt
