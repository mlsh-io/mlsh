name: mlsh-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # -- Build binaries (cross-platform) -------------------------------------------
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release -p mlsh-cli --target ${{ matrix.target }}

      - name: Build (cargo)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release -p mlsh-cli --target ${{ matrix.target }}

      - name: Create mlshtund symlink
        if: matrix.archive == 'tar.gz'
        run: ln -sf mlsh target/${{ matrix.target }}/release/mlshtund

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: tar czfh mlsh-cli-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release mlsh mlshtund

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/mlsh.exe target/${{ matrix.target }}/release/mlshtund.exe
          7z a mlsh-cli-${{ matrix.target }}.zip ./target/${{ matrix.target }}/release/mlsh.exe ./target/${{ matrix.target }}/release/mlshtund.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlsh-cli-${{ matrix.target }}
          path: mlsh-cli-${{ matrix.target }}.${{ matrix.archive }}

  # -- Create GitHub Release -----------------------------------------------------
  release:
    name: release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum mlsh-cli-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/mlsh-cli-*
            artifacts/checksums.txt
