name: mlsh-cli

# Mirror of mlsh-release.yml: same features, same packaging.
# If this workflow is green on a SHA, tagging that SHA is guaranteed to build.

on:
  push:
    branches: [main]
    paths:
      - "mlsh-cli/**"
      - "mlsh-crypto/**"
      - "mlsh-protocol/**"
      - "mlsh-menubar/**"
      - "installer/**"
      - ".github/workflows/mlsh-cli.yml"
      - ".github/workflows/mlsh-release.yml"
  pull_request:
    paths:
      - "mlsh-cli/**"
      - "mlsh-crypto/**"
      - "mlsh-protocol/**"
      - "mlsh-menubar/**"
      - "installer/**"
      - ".github/workflows/mlsh-cli.yml"
      - ".github/workflows/mlsh-release.yml"
  workflow_dispatch:

jobs:
  # -- Lint -----------------------------------------------------------------------
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check -p mlsh-cli
      - run: cargo clippy -p mlsh-cli -- -D warnings -A clippy::uninlined_format_args

  # -- Test -----------------------------------------------------------------------
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p mlsh-cli --lib

  # -- Build binaries (cross-platform) -------------------------------------------
  build:
    name: build (${{ matrix.target }})
    needs: [lint, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build UI
        shell: bash
        run: |
          cd mlsh-cli/ui
          npm ci
          npm run build

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release -p mlsh-cli --features control-plane --target ${{ matrix.target }}

      - name: Build (cargo)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release -p mlsh-cli --features control-plane --target ${{ matrix.target }}
        env:
          RUSTFLAGS: ${{ matrix.target == 'x86_64-pc-windows-msvc' && '-C target-feature=+crt-static' || '' }}

      - name: Create mlshtund symlink
        if: matrix.archive == 'tar.gz'
        run: ln -sf mlsh target/${{ matrix.target }}/release/mlshtund

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: tar czfh mlsh-cli-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release mlsh mlshtund

      - name: Download wintun
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          curl -fsSL -o wintun.zip https://www.wintun.net/builds/wintun-0.14.1.zip
          echo "07c256185d6ee3652e09fa55c0b673e2624b565e02c4b9091c79ca7d2f24ef51  wintun.zip" | sha256sum -c
          7z e wintun.zip wintun/bin/amd64/wintun.dll -o./wintun-amd64 -y
          7z e wintun.zip wintun/LICENSE.txt -o./wintun-license -y

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/mlsh.exe target/${{ matrix.target }}/release/mlshtund.exe
          7z a mlsh-cli-${{ matrix.target }}.zip \
            ./target/${{ matrix.target }}/release/mlsh.exe \
            ./target/${{ matrix.target }}/release/mlshtund.exe \
            ./wintun-amd64/wintun.dll \
            ./wintun-license/LICENSE.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlsh-cli-${{ matrix.target }}
          path: mlsh-cli-${{ matrix.target }}.${{ matrix.archive }}

  # -- Build macOS .app bundle --------------------------------------------------
  app-bundle:
    name: MLSH.app (universal)
    needs: [lint, test]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: app-bundle

      - name: Build MLSH.app (universal)
        run: make app-universal

      - name: Archive MLSH.app
        run: tar czfh MLSH.app.tar.gz -C target MLSH.app

      - name: Upload MLSH.app
        uses: actions/upload-artifact@v4
        with:
          name: MLSH.app
          path: MLSH.app.tar.gz

  # -- macOS .pkg installer (universal) ------------------------------------------
  macos-installer:
    name: macos-installer
    needs: [app-bundle]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Download MLSH.app
        uses: actions/download-artifact@v4
        with:
          name: MLSH.app
          path: artifacts

      - name: Extract MLSH.app
        run: tar xzf artifacts/MLSH.app.tar.gz

      - name: Build .pkg
        run: |
          chmod +x installer/macos/build-pkg.sh
          installer/macos/build-pkg.sh "ci-${{ github.sha }}" MLSH.app

      - name: Upload .pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlsh-macos-installer
          path: installer/macos/output/*.pkg

  # -- Linux .deb packages --------------------------------------------------------
  linux-deb:
    name: deb (${{ matrix.arch }})
    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: amd64
          - target: aarch64-unknown-linux-musl
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: mlsh-cli-${{ matrix.target }}
          path: artifacts

      - name: Extract binaries
        run: |
          mkdir -p bin
          tar xzf artifacts/mlsh-cli-${{ matrix.target }}.tar.gz -C bin

      - name: Build .deb
        run: |
          chmod +x installer/linux/build-deb.sh
          installer/linux/build-deb.sh "v0.0.0-ci" "${{ matrix.arch }}" bin

  # -- Linux .rpm packages --------------------------------------------------------
  linux-rpm:
    name: rpm (${{ matrix.arch }})
    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: x86_64
          - target: aarch64-unknown-linux-musl
            arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install rpmbuild
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: mlsh-cli-${{ matrix.target }}
          path: artifacts

      - name: Extract binaries
        run: |
          mkdir -p bin
          tar xzf artifacts/mlsh-cli-${{ matrix.target }}.tar.gz -C bin

      - name: Build .rpm
        run: |
          chmod +x installer/linux/build-rpm.sh
          installer/linux/build-rpm.sh "v0.0.0-ci" "${{ matrix.arch }}" bin

  # -- Windows Installer (Inno Setup) ---------------------------------------------
  windows-installer:
    name: windows-installer
    needs: [build]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: mlsh-cli-x86_64-pc-windows-msvc
          path: artifacts

      - name: Prepare installer input
        shell: bash
        run: |
          mkdir -p installer/windows/bin
          cd artifacts
          7z e mlsh-cli-x86_64-pc-windows-msvc.zip -o../installer/windows/bin -y -r

      - name: Build installer
        shell: cmd
        run: |
          iscc /DAppVersion=v0.0.0-ci installer\windows\mlsh.iss
