name: docs

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Override version tag (e.g. v0.3.0-rc1). Defaults to current tag."
        required: false
      staging:
        description: "Publish under /staging/ instead of /vX.Y.Z/."
        required: false
        default: "false"

permissions:
  contents: write
  packages: write

env:
  ZOLA_VERSION: "0.22.1"
  PAGEFIND_VERSION: "1.1.0"
  PUBLISH_BRANCH: "docs-site"
  IMAGE_NAME: "ghcr.io/${{ github.repository_owner }}/mlsh-docs"

jobs:
  build-and-publish:
    name: build and publish to ${{ env.PUBLISH_BRANCH }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.staging }}" = "true" ]; then
            echo "dir=staging" >>"$GITHUB_OUTPUT"
            echo "tag=staging" >>"$GITHUB_OUTPUT"
            echo "is_release=false" >>"$GITHUB_OUTPUT"
          else
            tag="${{ github.event.inputs.version }}"
            if [ -z "$tag" ]; then
              tag="${GITHUB_REF_NAME}"
            fi
            case "$tag" in
              v*) ;;
              *) echo "refusing to build for non-tag ref '$tag'"; exit 1 ;;
            esac
            echo "dir=$tag" >>"$GITHUB_OUTPUT"
            echo "tag=$tag" >>"$GITHUB_OUTPUT"
            echo "is_release=true" >>"$GITHUB_OUTPUT"
          fi

      - name: Install Zola
        run: |
          curl -fsSL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | sudo tar -xz -C /usr/local/bin
          zola --version

      - name: Install Pagefind
        run: |
          curl -fsSL "https://github.com/CloudCannon/pagefind/releases/download/v${PAGEFIND_VERSION}/pagefind-v${PAGEFIND_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | sudo tar -xz -C /usr/local/bin
          pagefind --version

      - name: Stamp current_version
        working-directory: docs
        run: |
          sed -i "s|^current_version = .*|current_version = \"${{ steps.version.outputs.tag }}\"|" config.toml
          grep current_version config.toml

      - name: Build site
        working-directory: docs
        run: |
          zola build --base-url "https://docs.mlsh.io/${{ steps.version.outputs.dir }}"

      - name: Build search index
        working-directory: docs
        run: pagefind --site public

      - name: Stage this version
        run: |
          mkdir -p staging-out/${{ steps.version.outputs.dir }}
          cp -a docs/public/. staging-out/${{ steps.version.outputs.dir }}/
          ls -la staging-out/

      - name: Publish to ${{ env.PUBLISH_BRANCH }} branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: ${{ env.PUBLISH_BRANCH }}
          publish_dir: ./staging-out
          keep_files: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "docs: publish ${{ steps.version.outputs.tag }}"

      - name: Refresh versions.json, latest symlink, and root redirect
        if: steps.version.outputs.is_release == 'true'
        id: refresh_branch
        run: |
          set -euo pipefail
          git fetch origin "${PUBLISH_BRANCH}:${PUBLISH_BRANCH}"
          worktree="$(mktemp -d)/docs-site"
          git worktree add "$worktree" "$PUBLISH_BRANCH"

          make docs-versions-json DIR="$worktree"

          cd "$worktree"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "docs-site branch already up to date"
          else
            git commit -m "docs: publish metadata for ${{ steps.version.outputs.tag }}"
            git push origin "$PUBLISH_BRANCH"
          fi

          echo "worktree=$worktree" >>"$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: steps.version.outputs.is_release == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image build context
        if: steps.version.outputs.is_release == 'true'
        run: |
          cp docs/Containerfile "${{ steps.refresh_branch.outputs.worktree }}/Containerfile"
          cat > "${{ steps.refresh_branch.outputs.worktree }}/.dockerignore" <<'EOF'
          .git
          .gitignore
          Containerfile
          .dockerignore
          EOF

      - name: Build and push docs image
        if: steps.version.outputs.is_release == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.refresh_branch.outputs.worktree }}
          file: ${{ steps.refresh_branch.outputs.worktree }}/Containerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
