<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mlsh-control</title>
  <style>
    :root { color-scheme: dark light; }
    body {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.4;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .meta { opacity: 0.7; font-size: 0.85rem; margin-bottom: 1.5rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid currentColor; opacity: 1; }
    th { opacity: 0.6; font-weight: 500; font-size: 0.8rem; text-transform: uppercase; }
    .online { color: #2ecc71; }
    .offline { color: #e74c3c; }
    .err { color: #e74c3c; padding: 1rem; border: 1px solid currentColor; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>mlsh-control</h1>
  <div class="meta" id="meta">loading…</div>
  <div id="content"></div>

  <script>
    async function jget(url) {
      const r = await fetch(url, { headers: { Accept: 'application/json' } });
      if (!r.ok) throw new Error(`${url} → ${r.status} ${r.statusText}`);
      return r.json();
    }

    async function main() {
      const meta = document.getElementById('meta');
      const content = document.getElementById('content');

      let me;
      try {
        me = await jget('/api/v1/whoami');
      } catch (e) {
        meta.innerHTML = `<span class="err">whoami failed: ${e.message}</span>`;
        return;
      }

      meta.textContent = `cluster: ${me.cluster || '(unknown)'} · roles: ${me.roles.join(', ')}`;
      if (!me.cluster) {
        content.innerHTML = '<p class="err">No cluster bound. mlshtund must be running with a control-role config.</p>';
        return;
      }

      let nodes;
      try {
        nodes = await jget(`/api/v1/clusters/${encodeURIComponent(me.cluster)}/nodes`);
      } catch (e) {
        content.innerHTML = `<div class="err">Failed to fetch nodes: ${e.message}</div>`;
        return;
      }

      if (!nodes.length) {
        content.innerHTML = '<p>No nodes in this cluster yet.</p>';
        return;
      }

      const rows = nodes.map(n => {
        const status = n.online
          ? '<span class="online">online</span>'
          : '<span class="offline">offline</span>';
        const label = n.display_name || n.node_id;
        return `<tr><td>${label}</td><td>${n.overlay_ip}</td><td>${n.role}</td><td>${status}</td></tr>`;
      }).join('');

      content.innerHTML = `
        <table>
          <thead>
            <tr><th>Node</th><th>Overlay IP</th><th>Role</th><th>Status</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    main();
  </script>
</body>
</html>
