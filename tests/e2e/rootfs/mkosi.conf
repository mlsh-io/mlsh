[Distribution]
Distribution=fedora
Release=43
Architecture=arm64
Repositories=fedora,updates

[Output]
Format=disk
ImageId=fedora-mlsh
SplitArtifacts=no

[Content]
Bootable=yes
Bootloader=grub
Packages=
        systemd
        systemd-udev
        kernel-core
        kernel-modules
        dracut
        grub2-efi-aa64
        grub2-efi-aa64-modules
        grub2-tools
        shim-aa64
        util-linux
        iproute
        nftables
        passwd
        glibc-minimal-langpack

KernelCommandLine=
        earlycon
        console=hvc0
        console=ttyAMA0
        console=ttyS0
        loglevel=7
        rw
        systemd.show_status=true
